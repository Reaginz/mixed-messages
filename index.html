<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Mixed Messages</title>

        <link href="./styles.css" rel="stylesheet" />
    </head>
    <body>
        <main class="table-scene">
            <div class="card-deck">
                <div class="deck-card deck-card-1">
                    <span class="corner top-left"></span>
                    <span class="corner top-right"></span>
                    <span class="corner bottom-left"></span>
                    <span class="corner bottom-right"></span>
                </div>

                <div class="deck-card deck-card-2">
                    <span class="corner top-left"></span>
                    <span class="corner top-right"></span>
                    <span class="corner bottom-left"></span>
                    <span class="corner bottom-right"></span>
                </div>

                <div class="deck-card deck-card-3">
                    <span class="corner top-left"></span>
                    <span class="corner top-right"></span>
                    <span class="corner bottom-left"></span>
                    <span class="corner bottom-right"></span>
                </div>

                <div class="deck-card deck-card-4">
                    <span class="corner top-left"></span>
                    <span class="corner top-right"></span>
                    <span class="corner bottom-left"></span>
                    <span class="corner bottom-right"></span>
                </div>

                <div class="deck-card deck-card-5">
                    <span class="corner top-left"></span>
                    <span class="corner top-right"></span>
                    <span class="corner bottom-left"></span>
                    <span class="corner bottom-right"></span>
                </div>
            </div>

            <div class="table-glows">
                <div class="table-glow glow-left"></div>
                <div class="table-glow glow-upper-right"></div>
                <div class="table-glow glow-lower-right"></div>
            </div>

            <div class="candles">
                <div class="candle candle-short">
                    <div class="flame"></div>
                    <div class="wick"></div>
                </div>

                <div class="candle candle-medium">
                    <div class="flame"></div>
                    <div class="wick"></div>
                </div>

                <div class="candle candle-tall">
                    <div class="flame"></div>
                    <div class="wick"></div>
                </div>
            </div>

            <div class="crystal-ball-stand">
                <div class="crystal-ball">
                    <p class="reading-text">Click the crystal ball to receive your reading!</p>
                </div>
                <div class="plinth"></div>
            </div>

            <div class="card">
                <div class="card-symbol"></div>
            </div>
        </main>

        <script src="./script.js"></script>
    </body>
</html>
