<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Mixed Messages | Bad Tarot Reader</title>

        <link href="./styles.css" rel="stylesheet" />
    </head>
    <body>
        <main class="table-scene" aria-label="Bad tarot reader">
            <div class="card-deck" aria-hidden="true">
                <div class="deck-card deck-card-1"></div>
                <div class="deck-card deck-card-2"></div>
                <div class="deck-card deck-card-3"></div>
                <div class="deck-card deck-card-4"></div>
                <div class="deck-card deck-card-5"></div>
            </div>

            <div class="table-glows" aria-hidden="true">
                <div class="table-glow glow-left"></div>
                <div class="table-glow glow-upper-right"></div>
                <div class="table-glow glow-lower-right"></div>
            </div>

            <div class="candles" aria-hidden="true">
                <div class="candle candle-short">
                    <div class="flame"></div>
                    <div class="wick"></div>
                </div>

                <div class="candle candle-medium">
                    <div class="flame"></div>
                    <div class="wick"></div>
                </div>

                <div class="candle candle-tall">
                    <div class="flame"></div>
                    <div class="wick"></div>
                </div>
            </div>

            <div class="crystal-ball-stand">
                <button class="crystal-ball" type="button">
                    <span class="reading-text">Click the crystal ball to receive your reading!</span>
                </button>
                <div class="plinth" aria-hidden="true"></div>
            </div>

            <div class="card" aria-hidden="true">
                <div class="card-symbol"></div>
            </div>
        </main>

        <script src="./script.js"></script>
    </body>
</html>
